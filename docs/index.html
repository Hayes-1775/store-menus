<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="900">
    <title>Flower Menu</title>
    <style>
      @font-face {
        font-family: "MADE Sunflower";
        src: url("assets/fonts/MADE-Sunflower.otf") format("opentype");
        font-display: block;
      }

      @font-face {
        font-family: "Gotham Medium";
        src: url("assets/fonts/Gotham-Medium.otf") format("opentype");
        font-display: block;
      }

      :root {
        --row-height: 48px;
        --body-size: 32px;
        --section-height: 60px;
        --section-size: 42px;
        --gap-after-section: 18px;
        --gap-between-groups: 24px;
        --section-pad-left: 16px;
        --name-pad-right: 14px;
        --bucket-gap: 8px;
        --bucket-icon-size: 28px;
        --bucket-icon-offset: 9px;
        --attention-icon-size: 38px;
        --attention-icon-gap: 7px;
        --attention-icon-offset: 8px;
        --attention-icon-glyph-size: 26px;
        --attention-pill-border: 2px;
        --attention-pill-padding-left: 12px;
        --attention-pill-padding-right: 22px;
        --attention-pill-text-size: 24px;
        --attention-pill-shift: 6px;
        --attention-pill-width-buffer: 58px;
        --closeout-pill-gap: 8px;
        --closeout-pill-padding-x: 18px;
        --closeout-pill-border: 2px;
        --closeout-pill-text-size: 26px;
        --closeout-leaf-size: 25px;
        --closeout-leaf-offset: 8px;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        color: #fff;
        font-family: "MADE Sunflower", Arial, Helvetica, sans-serif;
      }

      .screen {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 16%, rgba(120, 140, 200, 0.16), transparent 24%),
          radial-gradient(circle at 88% 74%, rgba(230, 35, 35, 0.10), transparent 28%),
          #000;
      }

      .menu {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 1080px;
        height: 1920px;
        background: #000;
        overflow: hidden;
        box-sizing: border-box;
        padding: 20px 38px 20px;
        z-index: 1;
        transform-origin: center center;
      }

      .menu::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          115deg,
          transparent 0%,
          transparent 42%,
          rgba(255, 255, 255, 0.08) 50%,
          transparent 58%,
          transparent 100%
        );
        mix-blend-mode: screen;
        transform: translateX(-120%);
        animation: page-sheen 18s linear infinite;
      }

      .header {
        display: grid;
        grid-template-columns: minmax(310px, 1fr) 95px 92px 92px 92px 92px 112px;
        align-items: end;
        column-gap: 0;
        height: 68px;
        font-family: "MADE Sunflower", Georgia, "Times New Roman", serif;
        font-weight: 700;
        white-space: nowrap;
      }

      .title {
        font-size: 48px;
        line-height: 1;
      }

      .column-label {
        text-align: center;
        font-size: 28px;
        line-height: 1;
        padding-top: 0;
        align-self: end;
      }

      .groups {
        display: flex;
        flex-direction: column;
      }

      .group:not(:last-child) {
        margin-bottom: var(--gap-between-groups);
      }

      .section-bar {
        position: relative;
        height: var(--section-height);
        display: flex;
        align-items: center;
        box-sizing: border-box;
        padding-left: var(--section-pad-left);
        margin-bottom: var(--gap-after-section);
        overflow: hidden;
        font-family: "MADE Sunflower", Georgia, "Times New Roman", serif;
        font-size: var(--section-size);
        line-height: 1;
        font-weight: 700;
      }

      .section-bar::before,
      .section-bar::after {
        content: "";
        position: absolute;
        inset: 0;
      }

      .section-bar::before {
        background: linear-gradient(90deg, var(--section-color), rgba(0, 0, 0, 0.92));
      }

      .section-bar::after {
        background: linear-gradient(
          110deg,
          transparent 0%,
          transparent 38%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 62%,
          transparent 100%
        );
        transform: translateX(-125%);
        animation: bar-sheen 9s ease-in-out infinite;
      }

      .section-bar span {
        position: relative;
        z-index: 1;
        transform: none;
      }

      .section-title {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .section-title-word {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        line-height: 1;
        color: inherit;
        text-shadow: inherit;
        animation: section-word-cycle 10.5s ease-in-out infinite;
      }

      .section-title-word:nth-child(2) {
        animation-delay: 3.5s;
      }

      .section-title-word:nth-child(3) {
        animation-delay: 7s;
      }

      .row {
        position: relative;
        display: grid;
        grid-template-columns: minmax(310px, 1fr) 95px 92px 92px 92px 92px 112px;
        height: var(--row-height);
        align-items: center;
        font-size: var(--body-size);
        line-height: 1;
        font-weight: 700;
        white-space: nowrap;
      }

      .row.aged-row .name {
        position: relative;
        z-index: 4;
        color: #fff7c2;
        overflow: visible;
        text-shadow: 0 0 12px rgba(255, 232, 138, 0.42);
        transform-origin: left center;
        will-change: transform, color, text-shadow;
      }

      .row.hidden-gem-row .name {
        overflow: visible;
      }

      .attention-char {
        display: inline-block;
        will-change: transform, color, text-shadow;
      }

      .product-name-text {
        display: inline-block;
        vertical-align: top;
      }

      .bucket-icon {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: var(--bucket-icon-size);
        height: var(--bucket-icon-size);
        margin-left: var(--bucket-icon-offset);
        color: #ffffff;
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.50));
        vertical-align: -0.07em;
      }

      .bucket-icon svg {
        display: block;
        width: 100%;
        height: 100%;
        fill: none;
        stroke: currentColor;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .rotating-header,
      .rotating-detail {
        grid-column: 4 / -1;
        position: relative;
        display: grid;
        grid-template-columns: 92px 92px 92px 112px;
        align-items: center;
        height: 100%;
      }

      .header-price-state,
      .header-descriptor-state,
      .price-state,
      .descriptor-state {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: 92px 92px 92px 112px;
        align-items: center;
      }

      .header-price-state,
      .price-state {
        animation: price-state-cycle 36s ease-in-out infinite;
      }

      .header-descriptor-state,
      .descriptor-state {
        opacity: 0;
        animation: descriptor-state-cycle 36s ease-in-out infinite;
      }

      .rotating-header .header-price-state,
      .rotating-header .header-descriptor-state {
        align-items: end;
      }

      .header-descriptor-state .feeling-heading {
        grid-column: 1 / 3;
      }

      .header-descriptor-state .looking-heading {
        grid-column: 3 / 5;
      }

      .descriptor-value {
        grid-column: 1 / 3;
        color: #fff7d6;
        font-size: 1em;
        text-align: center;
        text-shadow: 0 0 13px rgba(255, 247, 214, 0.35);
      }

      .bucket-value {
        grid-column: 3 / 5;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--bucket-gap);
        font-size: 1em;
        text-align: center;
      }

      .bucket-label {
        transform: translateY(0.02em);
      }

      .row.closeout .normal-row,
      .row.closeout .deal-row {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: minmax(310px, 1fr) 95px 92px 92px 92px 92px 112px;
        align-items: center;
      }

      .row.closeout .normal-row > .num,
      .row.closeout .normal-row .deal-cell {
        animation: normal-row-fade 36s ease-in-out infinite;
      }

      .row.closeout .normal-row .name {
        overflow: visible;
        position: relative;
        z-index: 3;
      }

      .closeout-name-copy {
        display: inline-block;
        will-change: transform;
      }

      .row.closeout .deal-row {
        opacity: 0;
        z-index: 5;
        animation: deal-row-fade 36s ease-in-out infinite;
        pointer-events: none;
      }

      .deal-message {
        grid-column: 2 / -1;
        justify-self: center;
        position: relative;
        z-index: 6;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--closeout-pill-gap);
        width: max-content;
        max-width: none;
        min-width: 0;
        height: 1.52em;
        padding: 0 var(--closeout-pill-padding-x) 1px;
        border: var(--closeout-pill-border) solid rgba(242, 201, 76, 0.82);
        border-radius: 999px;
        box-sizing: border-box;
        background: rgb(55, 40, 5);
        color: #fff7c2;
        filter: drop-shadow(0 0 16px rgba(242, 201, 76, 0.82));
        overflow: hidden;
        text-align: center;
        font-size: var(--closeout-pill-text-size);
        font-family: "Gotham Medium", Arial, Helvetica, sans-serif;
        line-height: 1;
        text-transform: uppercase;
        text-shadow: 0 0 12px rgba(255, 247, 194, 0.72);
        animation: deal-pill-pulse 36s ease-in-out infinite;
      }

      .deal-leaf {
        flex: 0 0 auto;
        display: block;
        width: 0.72em;
        height: 0.72em;
        fill: currentColor;
        filter: drop-shadow(0 0 8px rgba(242, 201, 76, 0.88));
        transform: translateY(1px);
      }

      .deal-message span {
        flex: 0 1 auto;
        min-width: 0;
        transform: translateY(1px);
      }

      .closeout-leaf {
        display: inline-block;
        width: var(--closeout-leaf-size);
        height: var(--closeout-leaf-size);
        margin-left: var(--closeout-leaf-offset);
        fill: #f2c94c;
        filter: drop-shadow(0 0 8px rgba(242, 201, 76, 0.82));
        vertical-align: -0.08em;
      }

      .name {
        overflow: hidden;
        text-overflow: clip;
        padding-right: var(--name-pad-right);
      }

      .attention-icon {
        position: relative;
        z-index: 5;
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        gap: var(--attention-icon-gap);
        margin-left: var(--attention-icon-offset);
        width: var(--attention-icon-size);
        height: var(--attention-icon-size);
        max-width: none;
        padding: 0;
        border: var(--attention-pill-border) solid transparent;
        border-radius: 999px;
        box-sizing: border-box;
        background: rgba(126, 217, 87, 0);
        color: #7ed957;
        filter: drop-shadow(0 0 10px rgba(126, 217, 87, 0.62));
        line-height: 1;
        overflow: hidden;
        vertical-align: -0.16em;
        transform-origin: left center;
        will-change: width, transform, color, filter, background-color, border-color;
      }

      .hidden-gem-icon {
        color: #38bdf8;
        filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.70));
      }

      .attention-icon svg {
        flex: 0 0 auto;
        display: block;
        width: var(--attention-icon-glyph-size);
        height: var(--attention-icon-glyph-size);
        fill: currentColor;
      }

      .attention-offer {
        display: inline-block;
        flex: 0 0 auto;
        color: #f7ffd9;
        font-size: var(--attention-pill-text-size);
        font-family: "Gotham Medium", Arial, Helvetica, sans-serif;
        line-height: 1;
        opacity: 0;
        white-space: nowrap;
        text-transform: uppercase;
        text-shadow: 0 0 12px rgba(247, 255, 217, 0.72);
        transform: translateX(calc(var(--attention-pill-shift) * -1));
        will-change: opacity, transform;
      }

      .num {
        position: relative;
        z-index: 1;
        text-align: center;
      }

      .loading,
      .error {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 40px;
        box-sizing: border-box;
        text-align: center;
        font: 700 32px/1.25 "MADE Sunflower", Arial, Helvetica, sans-serif;
        color: #fff;
        background: #000;
      }

      @keyframes page-sheen {
        0%,
        45% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(120%);
        }
      }

      @keyframes bar-sheen {
        0%,
        35% {
          transform: translateX(-125%);
        }
        70%,
        100% {
          transform: translateX(125%);
        }
      }

      @keyframes normal-row-fade {
        0%,
        8%,
        38%,
        100% {
          opacity: 1;
        }
        12%,
        34% {
          opacity: 0;
        }
      }

      @keyframes deal-row-fade {
        0%,
        8%,
        38%,
        100% {
          opacity: 0;
        }
        12%,
        34% {
          opacity: 1;
        }
      }

      @keyframes deal-pill-pulse {
        0%,
        8%,
        38%,
        100% {
          transform: scale(0.96);
          filter: drop-shadow(0 0 8px rgba(242, 201, 76, 0.42));
        }
        12%,
        34% {
          transform: scale(1);
          filter: drop-shadow(0 0 18px rgba(242, 201, 76, 0.92));
        }
      }

      @keyframes price-state-cycle {
        0%,
        46%,
        100% {
          opacity: 1;
          filter: blur(0);
        }
        50%,
        90% {
          opacity: 0;
          filter: blur(2px);
        }
        94% {
          opacity: 1;
          filter: blur(0);
        }
      }

      @keyframes descriptor-state-cycle {
        0%,
        52%,
        90%,
        100% {
          opacity: 0;
          filter: blur(2px);
        }
        56%,
        86% {
          opacity: 1;
          filter: blur(0);
        }
      }

      @keyframes section-word-cycle {
        0%,
        100% {
          opacity: 0;
          transform: none;
        }
        10%,
        24% {
          opacity: 1;
          transform: none;
        }
        34% {
          opacity: 0;
          transform: none;
        }
      }

    </style>
  </head>
  <body>
    <main class="screen">
      <section class="menu" aria-label="Flower Menu">
        <div class="header">
          <div class="title">Flower Menu</div>
          <div class="column-label">THC</div>
          <div class="column-label">Gram</div>
          <div class="rotating-header">
            <div class="header-price-state">
              <div class="column-label">1/8</div>
              <div class="column-label">1/4</div>
              <div class="column-label">1/2</div>
              <div class="column-label">Ounce</div>
            </div>
            <div class="header-descriptor-state">
              <div class="column-label feeling-heading">Feeling</div>
              <div class="column-label looking-heading">Looking For</div>
            </div>
          </div>
        </div>
        <div id="groups" class="groups">
          <div class="loading">Loading menu...</div>
        </div>
      </section>
    </main>
    <script src="vendor/gsap.min.js"></script>
    <script>
      const sections = [
        ["Indica", "rgb(120, 140, 200)"],
        ["Hybrid", "rgb(110, 185, 70)"],
        ["Sativa", "rgb(230, 35, 35)"]
      ];

      const productDescriptors = {
        "Red Pave": { adjective: "Tingly", bucket: "chill" },
        "Devils Den": { adjective: "Sedative", bucket: "sleepy" },
        "Hectane": { adjective: "Calming", bucket: "chill" },
        "Smashburger": { adjective: "Sleepy", bucket: "sleepy" },
        "Alley Oop": { adjective: "Balanced", bucket: "chill" },
        "Purple Churro": { adjective: "Soothing", bucket: "sleepy" },
        "Black Amber": { adjective: "Tranquil", bucket: "sleepy" },
        "Miracle Mintz": { adjective: "Potent", bucket: "hungry" },
        "Purple Panties": { adjective: "Carefree", bucket: "chill" },
        "Blueberry Donut": { adjective: "Euphoric", bucket: "chill" },
        "The Hive": { adjective: "Cheerful", bucket: "chill" },
        "Maltese Tiger": { adjective: "Uplifted", bucket: "energy" },
        "Timmeh": { adjective: "Mellow", bucket: "chill" },
        "Dantes Inferno": { adjective: "Relaxing", bucket: "sleepy" },
        "Triple Burger": { adjective: "Heavy", bucket: "sleepy" },
        "Dark Queen": { adjective: "Euphoric", bucket: "chill" },
        "Tea Time": { adjective: "Creative", bucket: "energy" },
        "Cherry Punch": { adjective: "Focused", bucket: "energy" },
        "Grease Bucket": { adjective: "Gassy", bucket: "hungry" },
        "Black Market": { adjective: "Uplifting", bucket: "energy" },
        "Scented Marker": { adjective: "Social", bucket: "hungry" },
        "Sheesh": { adjective: "Giggly", bucket: "energy" },
        "Mac Flurry": { adjective: "Chill", bucket: "chill" },
        "Cherry Paloma": { adjective: "Uplifting", bucket: "energy" },
        "Bananaconda": { adjective: "Relaxing", bucket: "sleepy" },
        "Pineapple Bang": { adjective: "Joyful", bucket: "energy" },
        "Tongue Splasher": { adjective: "Calming", bucket: "sleepy" },
        "Koji Sunberry": { adjective: "Bright", bucket: "energy" },
        "Jack Herer": { adjective: "Clearheaded", bucket: "energy" },
        "Southern Sunset": { adjective: "Bright", bucket: "energy" },
        "Dante's Cookie Jar": { adjective: "Motivating", bucket: "energy" },
        "College Park": { adjective: "Giggly", bucket: "energy" },
        "Ginger Tea": { adjective: "Focused", bucket: "energy" },
        "Where's My Bike": { adjective: "Talkative", bucket: "energy" },
        "Gelato Sweet Tea": { adjective: "Uplifting", bucket: "energy" },
        "Island Blends": { adjective: "Energizing", bucket: "energy" },
        "Hashburger": { adjective: "Gassy", bucket: "hungry" },
        "Caramel Cake": { adjective: "Energizing", bucket: "energy" },
        "Blue Dream": { adjective: "Creative", bucket: "energy" },
        "Ice Queen": { adjective: "Creative", bucket: "energy" },
        "Candied Lemons": { adjective: "Focused", bucket: "energy" },
        "High Desert Sour Sage": { adjective: "Alert", bucket: "energy" },
        "Durban Poison S1": { adjective: "Productive", bucket: "energy" }
      };

      const sectionDescriptors = {
        Indica: ["Chill", "Sleepy", "Heavy"],
        Hybrid: ["Balanced", "Hungry", "Social"],
        Sativa: ["Energy", "Focused", "Uplifted"]
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function getSectionMetrics(rowHeight) {
        return {
          sectionHeight: clamp(Math.floor(rowHeight * 1.28), 46, 68),
          gapAfterSection: clamp(Math.floor(rowHeight * 0.32), 10, 24),
          gapBetweenGroups: clamp(Math.floor(rowHeight * 0.40), 12, 30),
        };
      }

      function totalVerticalUsage(rowHeight, groupCount, rowCount) {
        const { sectionHeight, gapAfterSection, gapBetweenGroups } = getSectionMetrics(rowHeight);
        return (
          rowCount * rowHeight +
          groupCount * sectionHeight +
          groupCount * gapAfterSection +
          Math.max(groupCount - 1, 0) * gapBetweenGroups
        );
      }

      function applyDynamicSizing(rows, activeGroups) {
        const menuHeight = 1920;
        const contentTop = 88;
        const bottomMargin = 20;
        const available = menuHeight - contentTop - bottomMargin;
        const groupCount = activeGroups.length;
        const rowCount = Math.max(rows.length, 1);
        let rowHeight = 34;
        for (let candidate = 54; candidate >= 34; candidate -= 1) {
          if (totalVerticalUsage(candidate, groupCount, rowCount) <= available) {
            rowHeight = candidate;
            break;
          }
        }
        const bodySize = clamp(Math.floor(rowHeight * 0.68), 24, 36);
        const { sectionHeight, gapAfterSection, gapBetweenGroups } = getSectionMetrics(rowHeight);
        const sectionSize = clamp(Math.floor(sectionHeight * 0.70), 32, 48);
        const sectionPadLeft = clamp(Math.floor(sectionHeight * 0.28), 12, 18);
        const namePadRight = clamp(Math.floor(rowHeight * 0.36), 8, 14);
        const bucketGap = clamp(Math.floor(rowHeight * 0.14), 4, 8);
        const bucketIconSize = clamp(Math.floor(bodySize * 0.86), 22, 30);
        const bucketIconOffset = clamp(Math.floor(rowHeight * 0.20), 5, 9);
        const attentionIconSize = clamp(Math.floor(rowHeight * 0.78), 28, 40);
        const attentionIconGap = clamp(Math.floor(rowHeight * 0.12), 4, 7);
        const attentionIconOffset = clamp(Math.floor(rowHeight * 0.18), 5, 8);
        const attentionIconGlyphSize = clamp(Math.floor(attentionIconSize * 0.68), 18, 28);
        const attentionPillBorder = clamp(Math.round(rowHeight * 0.05), 1, 2);
        const attentionPillPaddingLeft = clamp(Math.floor(rowHeight * 0.30), 8, 12);
        const attentionPillPaddingRight = clamp(Math.floor(rowHeight * 0.56), 14, 22);
        const attentionPillTextSize = clamp(Math.floor(bodySize * 0.76), 18, 28);
        const attentionPillShift = clamp(Math.floor(rowHeight * 0.16), 4, 6);
        const attentionPillWidthBuffer = clamp(Math.floor(rowHeight * 1.28), 42, 58);
        const closeoutPillGap = clamp(Math.floor(rowHeight * 0.14), 4, 8);
        const closeoutPillPaddingX = clamp(Math.floor(rowHeight * 0.50), 12, 18);
        const closeoutPillBorder = clamp(Math.round(rowHeight * 0.05), 1, 2);
        const closeoutPillTextSize = clamp(Math.floor(bodySize * 0.80), 19, 28);
        const closeoutLeafSize = clamp(Math.floor(bodySize * 0.78), 18, 28);
        const closeoutLeafOffset = clamp(Math.floor(rowHeight * 0.18), 5, 8);

        const root = document.documentElement.style;
        root.setProperty("--row-height", `${rowHeight}px`);
        root.setProperty("--body-size", `${bodySize}px`);
        root.setProperty("--section-height", `${sectionHeight}px`);
        root.setProperty("--section-size", `${sectionSize}px`);
        root.setProperty("--gap-after-section", `${gapAfterSection}px`);
        root.setProperty("--gap-between-groups", `${gapBetweenGroups}px`);
        root.setProperty("--section-pad-left", `${sectionPadLeft}px`);
        root.setProperty("--name-pad-right", `${namePadRight}px`);
        root.setProperty("--bucket-gap", `${bucketGap}px`);
        root.setProperty("--bucket-icon-size", `${bucketIconSize}px`);
        root.setProperty("--bucket-icon-offset", `${bucketIconOffset}px`);
        root.setProperty("--attention-icon-size", `${attentionIconSize}px`);
        root.setProperty("--attention-icon-gap", `${attentionIconGap}px`);
        root.setProperty("--attention-icon-offset", `${attentionIconOffset}px`);
        root.setProperty("--attention-icon-glyph-size", `${attentionIconGlyphSize}px`);
        root.setProperty("--attention-pill-border", `${attentionPillBorder}px`);
        root.setProperty("--attention-pill-padding-left", `${attentionPillPaddingLeft}px`);
        root.setProperty("--attention-pill-padding-right", `${attentionPillPaddingRight}px`);
        root.setProperty("--attention-pill-text-size", `${attentionPillTextSize}px`);
        root.setProperty("--attention-pill-shift", `${attentionPillShift}px`);
        root.setProperty("--attention-pill-width-buffer", `${attentionPillWidthBuffer}px`);
        root.setProperty("--closeout-pill-gap", `${closeoutPillGap}px`);
        root.setProperty("--closeout-pill-padding-x", `${closeoutPillPaddingX}px`);
        root.setProperty("--closeout-pill-border", `${closeoutPillBorder}px`);
        root.setProperty("--closeout-pill-text-size", `${closeoutPillTextSize}px`);
        root.setProperty("--closeout-leaf-size", `${closeoutLeafSize}px`);
        root.setProperty("--closeout-leaf-offset", `${closeoutLeafOffset}px`);
      }

      function rowHtml(row) {
        const isHiddenGem = row.no_recent_sales && !row.aged_inventory && !row.closeout;
        const hiddenGemMarker = isHiddenGem
          ? hiddenGemIconHtml()
          : "";
        const productName = row.aged_inventory
          ? `${productNameHtml(row)}${attentionIconHtml(row)}`
          : `${productNameHtml(row)}${hiddenGemMarker}`;
        const descriptor = productDescriptors[row.product_name] || {};
        const rotatingDetail = rotatingDetailHtml(row, descriptor);
        const rowClasses = [
          "row",
          row.aged_inventory ? "aged-row" : "",
          isHiddenGem ? "hidden-gem-row" : ""
        ].filter(Boolean).join(" ");
        if (row.closeout) {
          return `
            <div class="${rowClasses} closeout">
              <div class="normal-row">
                <div class="name"><span class="closeout-name-copy">${productName}${leafIconHtml("closeout-leaf")}</span></div>
                <div class="num">${escapeHtml(row.thc_display)}</div>
                <div class="num">${escapeHtml(row.gram)}</div>
                ${rotatingDetail}
              </div>
              <div class="deal-row">
                <div class="deal-message">
                  ${leafIconHtml()}
                  <span>End of jar deal: buy it all, 30% off!</span>
                </div>
              </div>
            </div>
          `;
        }

        return `
          <div class="${rowClasses}">
            <div class="name">${productName}</div>
            <div class="num">${escapeHtml(row.thc_display)}</div>
            <div class="num">${escapeHtml(row.gram)}</div>
            ${rotatingDetail}
          </div>
        `;
      }

      function sectionBarHtml(strain) {
        const words = (sectionDescriptors[strain] || []).slice(0, 3);
        return `
          <div class="section-bar">
            <div class="section-title" aria-label="${escapeHtml(strain)}">
              ${words.map((word) => `<span class="section-title-word">${escapeHtml(word)}</span>`).join("")}
            </div>
          </div>
        `;
      }

      function hiddenGemIconHtml() {
        return `
          <span class="attention-icon hidden-gem-icon" aria-hidden="true">
            ${diamondIconHtml()}
            <span class="attention-offer hidden-gem-offer">Hidden Gem</span>
          </span>
        `;
      }

      function diamondIconHtml() {
        return `
          <svg viewBox="0 0 64 64" focusable="false" aria-hidden="true">
            <path d="M32 5 59 32 32 59 5 32 32 5Z" />
          </svg>
        `;
      }

      function attentionIconHtml(row) {
        if (!row.aged_inventory) return "";
        return `
          <span class="attention-icon" aria-hidden="true">
            ${leafIconHtml()}
            <span class="attention-offer">Online pricing 20% off</span>
          </span>
        `;
      }

      function leafIconHtml(className = "deal-leaf") {
        return `
          <svg class="${className}" viewBox="0 0 64 64" focusable="false" aria-hidden="true">
            <path d="M32 6c2.5 7.2 3.8 13.2 3.5 18 4.1-5.2 9.1-9 15-11.3-.5 7.8-3.2 14.1-8.1 18.7 5.6-1.1 10.8-.8 15.6.9-4.4 6.1-9.7 9.8-15.9 11.1 3.8 2 7 4.7 9.6 8.1-7.2 1.2-13.1-.2-17.7-4.2v10.2h-4V47.3c-4.6 4-10.5 5.4-17.7 4.2 2.6-3.4 5.8-6.1 9.6-8.1-6.2-1.3-11.5-5-15.9-11.1 4.8-1.7 10-2 15.6-.9-4.9-4.6-7.6-10.9-8.1-18.7 5.9 2.3 10.9 6.1 15 11.3-.3-4.8 1-10.8 3.5-18Z" />
          </svg>
        `;
      }

      function productNameHtml(row) {
        return row.aged_inventory
          ? `<span class="product-name-text">${animatedProductNameHtml(row.product_name)}</span>`
          : escapeHtml(row.product_name);
      }

      function animatedProductNameHtml(productName) {
        return String(productName ?? "")
          .split("")
          .map((char) => `<span class="attention-char">${char === " " ? "&nbsp;" : escapeHtml(char)}</span>`)
          .join("");
      }

      function bucketIconHtml(bucket) {
        const icons = {
          sleepy: `
            <svg viewBox="0 0 64 64" focusable="false" aria-hidden="true">
              <path d="M45.6 49.8A21.8 21.8 0 0 1 37.5 7.7 25.7 25.7 0 1 0 56.3 44a21.7 21.7 0 0 1-10.7 5.8Z" />
            </svg>
          `,
          energy: `
            <svg viewBox="0 0 64 64" focusable="false" aria-hidden="true">
              <path d="M35.8 4 13.6 36.5h16.1L25.8 60l24.6-34.5H34.1L35.8 4Z" />
            </svg>
          `,
          hungry: `
            <svg viewBox="0 0 64 64" focusable="false" aria-hidden="true">
              <path d="M18 5v21" />
              <path d="M10 5v16a8 8 0 0 0 16 0V5" />
              <path d="M18 29v30" />
              <path d="M45 5v54" />
              <path d="M45 5c7 4.2 10 10.1 10 17.8 0 7.6-3 13.4-10 17.2" />
            </svg>
          `,
          chill: `
            <svg viewBox="0 0 64 64" focusable="false" aria-hidden="true">
              <circle cx="32" cy="32" r="25" />
              <path d="M22 38c2.4 4.1 5.7 6.1 10 6.1s7.6-2 10-6.1" />
              <path d="M23 25h.1M41 25h.1" />
            </svg>
          `
        };
        if (!icons[bucket]) return "";
        return `<span class="bucket-icon bucket-${bucket}" aria-hidden="true">${icons[bucket]}</span>`;
      }

      function bucketLabel(bucket) {
        const labels = {
          sleepy: "Sleepy",
          energy: "Energy",
          hungry: "Hungry",
          chill: "Chill"
        };
        return labels[bucket] || "";
      }

      function rotatingDetailHtml(row, descriptor) {
        const adjective = descriptor.adjective ? escapeHtml(descriptor.adjective) : "";
        const label = bucketLabel(descriptor.bucket);
        return `
          <div class="rotating-detail deal-cell">
            <div class="price-state">
              <div class="num">${escapeHtml(row.eighth)}</div>
              <div class="num">${escapeHtml(row.quarter)}</div>
              <div class="num">${escapeHtml(row.half)}</div>
              <div class="num">${escapeHtml(row.ounce)}</div>
            </div>
            <div class="descriptor-state">
              <div class="num descriptor-value">${adjective}</div>
              <div class="num bucket-value">
                ${bucketIconHtml(descriptor.bucket)}
                <span class="bucket-label">${escapeHtml(label)}</span>
              </div>
            </div>
          </div>
        `;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderMenu(payload) {
        const rows = payload.rows || [];
        const activeGroups = sections.filter(([strain]) => rows.some((row) => row.strain === strain));
        applyDynamicSizing(rows, activeGroups);

        const groups = document.getElementById("groups");
        groups.innerHTML = activeGroups.map(([strain, color]) => {
          const groupRows = rows.filter((row) => row.strain === strain);
          return `
            <section class="group" style="--section-color: ${color}">
              ${sectionBarHtml(strain)}
              ${groupRows.map(rowHtml).join("")}
            </section>
          `;
        }).join("");
        animateAgedInventoryRows();
      }

      function animateOfferPill(marker, offer, delay, colors) {
        const activeWidth = measureOfferPillWidth(marker, offer);
        const pillMetrics = getPillMetrics();
        gsap.timeline({ repeat: -1, repeatDelay: 32.24, delay })
          .to(marker, {
            width: activeWidth,
            paddingLeft: `${pillMetrics.paddingLeft}px`,
            paddingRight: `${pillMetrics.paddingRight}px`,
            borderColor: colors.border,
            backgroundColor: colors.background,
            scale: 1.04,
            rotate: 0,
            color: colors.active,
            filter: colors.activeFilter,
            duration: 0.38,
            ease: "back.out(1.8)"
          }, 0)
          .to(offer, {
            opacity: 1,
            x: 0,
            duration: 0.24,
            ease: "power2.out"
          })
          .to(marker, {
            scale: 1.08,
            duration: 0.52,
            ease: "sine.inOut",
            yoyo: true,
            repeat: 1
          })
          .to(marker, {
            scale: 1.04,
            duration: 1.6,
            ease: "none"
          })
          .to(offer, {
            opacity: 0,
            x: -pillMetrics.shift,
            duration: 0.18,
            ease: "power1.in"
          })
          .to(marker, {
            width: "1.2em",
            paddingLeft: 0,
            paddingRight: 0,
            borderColor: colors.restBorder,
            backgroundColor: colors.restBackground,
            scale: 1,
            rotate: 0,
            color: colors.rest,
            filter: colors.restFilter,
            duration: 0.32,
            ease: "power2.inOut"
          }, "<");
      }

      function measureOfferPillWidth(marker, offer) {
        const icon = marker.querySelector("svg");
        const markerStyle = getComputedStyle(marker);
        const pillMetrics = getPillMetrics();
        const gap = parseFloat(markerStyle.gap) || 0;
        const iconWidth = icon ? icon.getBoundingClientRect().width : 0;
        const offerWidth = measureTextWidth(offer);
        const activePadding = pillMetrics.paddingLeft + pillMetrics.paddingRight;
        const borderWidth = pillMetrics.border * 2;
        return `${Math.ceil(iconWidth + gap + offerWidth + activePadding + borderWidth + pillMetrics.buffer)}px`;
      }

      function getPillMetrics() {
        const rootStyle = getComputedStyle(document.documentElement);
        return {
          paddingLeft: parseFloat(rootStyle.getPropertyValue("--attention-pill-padding-left")) || 12,
          paddingRight: parseFloat(rootStyle.getPropertyValue("--attention-pill-padding-right")) || 22,
          border: parseFloat(rootStyle.getPropertyValue("--attention-pill-border")) || 2,
          shift: parseFloat(rootStyle.getPropertyValue("--attention-pill-shift")) || 6,
          buffer: parseFloat(rootStyle.getPropertyValue("--attention-pill-width-buffer")) || 58,
        };
      }

      function measureTextWidth(source) {
        if (!source) return 0;
        const style = getComputedStyle(source);
        const probe = document.createElement("span");
        probe.textContent = source.textContent;
        probe.style.position = "absolute";
        probe.style.left = "-9999px";
        probe.style.top = "-9999px";
        probe.style.visibility = "hidden";
        probe.style.whiteSpace = "nowrap";
        probe.style.font = style.font;
        probe.style.letterSpacing = style.letterSpacing;
        probe.style.textTransform = style.textTransform;
        document.body.appendChild(probe);
        const width = probe.getBoundingClientRect().width;
        probe.remove();
        return width;
      }

      function animateAgedInventoryRows() {
        if (!window.gsap) return;
        const agedRows = gsap.utils.toArray(".row.aged-row");
        const hiddenGemRows = gsap.utils.toArray(".row.hidden-gem-row");
        if (!agedRows.length && !hiddenGemRows.length) return;
        document.documentElement.dataset.gsapTextAnimation = "active";

        agedRows.forEach((row, index) => {
          const name = row.querySelector(".name");
          const marker = row.querySelector(".attention-icon:not(.bucket-icon)");
          const offer = marker ? marker.querySelector(".attention-offer") : null;
          const chars = name.querySelectorAll(".attention-char");
          const delay = index * 0.35;

          gsap.timeline({ repeat: -1, repeatDelay: 35.06, delay: delay + 7.4 })
            .to(name, {
              color: "#fff1a8",
              scale: 1.035,
              textShadow: "0 0 22px rgba(255, 232, 138, 0.85)",
              duration: 0.32,
              ease: "power2.out"
            })
            .to(name, {
              color: "#ffffff",
              scale: 1,
              textShadow: "0 0 8px rgba(255, 232, 138, 0.34)",
              duration: 0.62,
              ease: "elastic.out(1, 0.45)"
            });

          gsap.timeline({ repeat: -1, repeatDelay: 35.45, delay: delay + 7.42 })
            .to(chars, {
              y: -4,
              color: "#ffe88a",
              textShadow: "0 0 18px rgba(255, 232, 138, 0.78)",
              duration: 0.18,
              ease: "power2.out",
              stagger: { each: 0.018, from: "start" }
            })
            .to(chars, {
              y: 0,
              color: "#ffffff",
              textShadow: "0 0 8px rgba(255, 232, 138, 0.34)",
              duration: 0.28,
              ease: "power2.out",
              stagger: { each: 0.012, from: "start" }
            }, "-=0.04");

          animateOfferPill(marker, offer, delay + 7.5, {
            active: "#b8ff70",
            rest: "#7ed957",
            border: "rgba(184, 255, 112, 0.74)",
            restBorder: "rgba(184, 255, 112, 0)",
            background: "rgb(18, 45, 16)",
            restBackground: "rgba(126, 217, 87, 0)",
            activeFilter: "drop-shadow(0 0 18px rgba(184, 255, 112, 0.94))",
            restFilter: "drop-shadow(0 0 10px rgba(126, 217, 87, 0.62))"
          });
        });

        hiddenGemRows.forEach((row, index) => {
          const marker = row.querySelector(".attention-icon:not(.bucket-icon)");
          const offer = marker ? marker.querySelector(".attention-offer") : null;
          const delay = index * 0.35;
          animateOfferPill(marker, offer, delay + 1.08, {
            active: "#38bdf8",
            rest: "#38bdf8",
            border: "rgba(56, 189, 248, 0.78)",
            restBorder: "rgba(56, 189, 248, 0)",
            background: "rgb(7, 32, 52)",
            restBackground: "rgba(56, 189, 248, 0)",
            activeFilter: "drop-shadow(0 0 18px rgba(56, 189, 248, 0.95))",
            restFilter: "drop-shadow(0 0 10px rgba(56, 189, 248, 0.70))"
          });
        });
      }

      fetch("menu-data.json", { cache: "no-store" })
        .then((response) => {
          if (!response.ok) throw new Error(`Menu data failed to load: ${response.status}`);
          return response.json();
        })
        .then(renderMenu)
        .catch((error) => {
          document.getElementById("groups").innerHTML =
            `<div class="error">Menu data unavailable<br>${escapeHtml(error.message)}</div>`;
        });

      function scaleMenu() {
        const menu = document.querySelector(".menu");
        const menuWidth = 1080;
        const menuHeight = 1920;
        const rotateMode = new URLSearchParams(window.location.search).get("rotate");
        const shouldRotate =
          rotateMode === "ccw" ||
          (rotateMode !== "none" && window.innerWidth > window.innerHeight);

        if (shouldRotate) {
          const scale = Math.min(window.innerWidth / menuHeight, window.innerHeight / menuWidth);
          menu.style.transform = `translate(-50%, -50%) rotate(-90deg) scale(${scale})`;
          return;
        }

        const scale = Math.min(window.innerWidth / menuWidth, window.innerHeight / menuHeight);
        menu.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }

      window.addEventListener("resize", scaleMenu);
      scaleMenu();
    </script>
  </body>
</html>
