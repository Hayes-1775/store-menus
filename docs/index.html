<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="900">
    <title>Flower Menu</title>
    <style>
      :root {
        --row-height: 48px;
        --body-size: 32px;
        --section-height: 60px;
        --section-size: 42px;
        --gap-after-section: 18px;
        --gap-between-groups: 24px;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
      }

      .screen {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 16%, rgba(120, 140, 200, 0.16), transparent 24%),
          radial-gradient(circle at 88% 74%, rgba(230, 35, 35, 0.10), transparent 28%),
          #000;
      }

      .menu {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 1080px;
        height: 1920px;
        background: #000;
        overflow: hidden;
        box-sizing: border-box;
        padding: 20px 38px 34px;
        z-index: 1;
        transform-origin: center center;
      }

      .menu::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          115deg,
          transparent 0%,
          transparent 42%,
          rgba(255, 255, 255, 0.08) 50%,
          transparent 58%,
          transparent 100%
        );
        mix-blend-mode: screen;
        transform: translateX(-120%);
        animation: page-sheen 18s linear infinite;
      }

      .header {
        display: grid;
        grid-template-columns: minmax(310px, 1fr) 95px 92px 92px 92px 92px 112px;
        align-items: start;
        column-gap: 0;
        height: 68px;
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 700;
        white-space: nowrap;
      }

      .title {
        font-size: 48px;
        line-height: 1;
      }

      .column-label {
        text-align: center;
        font-size: 28px;
        line-height: 1;
        padding-top: 8px;
      }

      .groups {
        display: flex;
        flex-direction: column;
      }

      .group:not(:last-child) {
        margin-bottom: var(--gap-between-groups);
      }

      .section-bar {
        position: relative;
        height: var(--section-height);
        display: flex;
        align-items: center;
        box-sizing: border-box;
        padding-left: 16px;
        margin-bottom: var(--gap-after-section);
        overflow: hidden;
        font-family: Georgia, "Times New Roman", serif;
        font-size: var(--section-size);
        line-height: 1;
        font-weight: 700;
      }

      .section-bar::before,
      .section-bar::after {
        content: "";
        position: absolute;
        inset: 0;
      }

      .section-bar::before {
        background: linear-gradient(90deg, var(--section-color), rgba(0, 0, 0, 0.92));
      }

      .section-bar::after {
        background: linear-gradient(
          110deg,
          transparent 0%,
          transparent 38%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 62%,
          transparent 100%
        );
        transform: translateX(-125%);
        animation: bar-sheen 9s ease-in-out infinite;
      }

      .section-bar span {
        position: relative;
        z-index: 1;
        transform: translateY(-0.02em);
      }

      .row {
        position: relative;
        display: grid;
        grid-template-columns: minmax(310px, 1fr) 95px 92px 92px 92px 92px 112px;
        height: var(--row-height);
        align-items: center;
        font-size: var(--body-size);
        line-height: 1;
        font-weight: 700;
        white-space: nowrap;
      }

      .row.closeout .normal-row,
      .row.closeout .deal-row {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: minmax(310px, 1fr) 95px 92px 92px 92px 92px 112px;
        align-items: center;
      }

      .row.closeout .normal-row .deal-cell {
        animation: normal-row-fade 8s ease-in-out infinite;
      }

      .row.closeout .deal-row {
        opacity: 0;
        color: #ffe88a;
        text-shadow: 0 0 14px rgba(255, 220, 90, 0.42);
        animation: deal-row-fade 8s ease-in-out infinite;
        pointer-events: none;
      }

      .deal-message {
        grid-column: 2 / -1;
        overflow: hidden;
        text-overflow: clip;
        text-align: center;
        font-size: min(var(--body-size), 30px);
      }

      .name {
        overflow: hidden;
        text-overflow: clip;
        padding-right: 14px;
      }

      .num {
        text-align: center;
      }

      .loading,
      .error {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 40px;
        box-sizing: border-box;
        text-align: center;
        font: 700 32px/1.25 Arial, Helvetica, sans-serif;
        color: #fff;
        background: #000;
      }

      @keyframes page-sheen {
        0%,
        45% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(120%);
        }
      }

      @keyframes bar-sheen {
        0%,
        35% {
          transform: translateX(-125%);
        }
        70%,
        100% {
          transform: translateX(125%);
        }
      }

      @keyframes normal-row-fade {
        0%,
        48%,
        100% {
          opacity: 1;
        }
        58%,
        88% {
          opacity: 0;
        }
      }

      @keyframes deal-row-fade {
        0%,
        48%,
        100% {
          opacity: 0;
        }
        58%,
        88% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="screen">
      <section class="menu" aria-label="Flower Menu">
        <div class="header">
          <div class="title">Flower Menu</div>
          <div class="column-label">THC</div>
          <div class="column-label">Gram</div>
          <div class="column-label">1/8</div>
          <div class="column-label">1/4</div>
          <div class="column-label">1/2</div>
          <div class="column-label">Ounce</div>
        </div>
        <div id="groups" class="groups">
          <div class="loading">Loading menu...</div>
        </div>
      </section>
    </main>
    <script>
      const sections = [
        ["Indica", "rgb(120, 140, 200)"],
        ["Hybrid", "rgb(110, 185, 70)"],
        ["Sativa", "rgb(230, 35, 35)"]
      ];

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function applyDynamicSizing(rows, activeGroups) {
        const menuHeight = 1920;
        const contentTop = 88;
        const bottomMargin = 34;
        const available = menuHeight - contentTop - bottomMargin;
        const groupCount = activeGroups.length;
        const rowCount = Math.max(rows.length, 1);
        const targetRow = Math.floor(
          (available - groupCount * 60 - groupCount * 18 - Math.max(groupCount - 1, 0) * 24) / rowCount
        );
        const rowHeight = clamp(targetRow, 38, 54);
        const bodySize = clamp(Math.floor(rowHeight * 0.68), 26, 36);
        const sectionHeight = clamp(Math.floor(rowHeight * 1.34), 54, 68);
        const sectionSize = clamp(Math.floor(sectionHeight * 0.70), 36, 48);
        const gapAfterSection = clamp(Math.floor(rowHeight * 0.40), 16, 24);
        const gapBetweenGroups = clamp(Math.floor(rowHeight * 0.52), 18, 30);

        const root = document.documentElement.style;
        root.setProperty("--row-height", `${rowHeight}px`);
        root.setProperty("--body-size", `${bodySize}px`);
        root.setProperty("--section-height", `${sectionHeight}px`);
        root.setProperty("--section-size", `${sectionSize}px`);
        root.setProperty("--gap-after-section", `${gapAfterSection}px`);
        root.setProperty("--gap-between-groups", `${gapBetweenGroups}px`);
      }

      function rowHtml(row) {
        if (row.closeout) {
          return `
            <div class="row closeout">
              <div class="normal-row">
                <div class="name">${escapeHtml(row.product_name)}</div>
                <div class="num deal-cell">${escapeHtml(row.thc_display)}</div>
                <div class="num deal-cell">${escapeHtml(row.gram)}</div>
                <div class="num deal-cell">${escapeHtml(row.eighth)}</div>
                <div class="num deal-cell">${escapeHtml(row.quarter)}</div>
                <div class="num deal-cell">${escapeHtml(row.half)}</div>
                <div class="num deal-cell">${escapeHtml(row.ounce)}</div>
              </div>
              <div class="deal-row">
                <div class="deal-message">End of jar deal: buy it all, 30% off!</div>
              </div>
            </div>
          `;
        }

        return `
          <div class="row">
            <div class="name">${escapeHtml(row.product_name)}</div>
            <div class="num">${escapeHtml(row.thc_display)}</div>
            <div class="num">${escapeHtml(row.gram)}</div>
            <div class="num">${escapeHtml(row.eighth)}</div>
            <div class="num">${escapeHtml(row.quarter)}</div>
            <div class="num">${escapeHtml(row.half)}</div>
            <div class="num">${escapeHtml(row.ounce)}</div>
          </div>
        `;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderMenu(payload) {
        const rows = payload.rows || [];
        const activeGroups = sections.filter(([strain]) => rows.some((row) => row.strain === strain));
        applyDynamicSizing(rows, activeGroups);

        const groups = document.getElementById("groups");
        groups.innerHTML = activeGroups.map(([strain, color]) => {
          const groupRows = rows.filter((row) => row.strain === strain);
          return `
            <section class="group" style="--section-color: ${color}">
              <div class="section-bar"><span>${strain}</span></div>
              ${groupRows.map(rowHtml).join("")}
            </section>
          `;
        }).join("");
      }

      fetch("menu-data.json", { cache: "no-store" })
        .then((response) => {
          if (!response.ok) throw new Error(`Menu data failed to load: ${response.status}`);
          return response.json();
        })
        .then(renderMenu)
        .catch((error) => {
          document.getElementById("groups").innerHTML =
            `<div class="error">Menu data unavailable<br>${escapeHtml(error.message)}</div>`;
        });

      function scaleMenu() {
        const menu = document.querySelector(".menu");
        const menuWidth = 1080;
        const menuHeight = 1920;
        const rotateMode = new URLSearchParams(window.location.search).get("rotate");
        const shouldRotate =
          rotateMode === "ccw" ||
          (rotateMode !== "none" && window.innerWidth > window.innerHeight);

        if (shouldRotate) {
          const scale = Math.min(window.innerWidth / menuHeight, window.innerHeight / menuWidth);
          menu.style.transform = `translate(-50%, -50%) rotate(-90deg) scale(${scale})`;
          return;
        }

        const scale = Math.min(window.innerWidth / menuWidth, window.innerHeight / menuHeight);
        menu.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }

      window.addEventListener("resize", scaleMenu);
      scaleMenu();
    </script>
  </body>
</html>
