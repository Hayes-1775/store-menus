<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="900">
    <title>Flower Menu</title>
    <style>
      :root {
        --row-height: 48px;
        --body-size: 32px;
        --section-height: 60px;
        --section-size: 42px;
        --gap-after-section: 18px;
        --gap-between-groups: 24px;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
      }

      .screen {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 16%, rgba(120, 140, 200, 0.16), transparent 24%),
          radial-gradient(circle at 88% 74%, rgba(230, 35, 35, 0.10), transparent 28%),
          #000;
      }

      .menu {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 1080px;
        height: 1920px;
        background: #000;
        overflow: hidden;
        box-sizing: border-box;
        padding: 20px 38px 34px;
        z-index: 1;
        transform-origin: center center;
      }

      .menu::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          115deg,
          transparent 0%,
          transparent 42%,
          rgba(255, 255, 255, 0.08) 50%,
          transparent 58%,
          transparent 100%
        );
        mix-blend-mode: screen;
        transform: translateX(-120%);
        animation: page-sheen 18s linear infinite;
      }

      .header {
        display: grid;
        grid-template-columns: minmax(310px, 1fr) 95px 92px 92px 92px 92px 112px;
        align-items: start;
        column-gap: 0;
        height: 68px;
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 700;
        white-space: nowrap;
      }

      .title {
        font-size: 48px;
        line-height: 1;
      }

      .column-label {
        text-align: center;
        font-size: 28px;
        line-height: 1;
        padding-top: 8px;
      }

      .groups {
        display: flex;
        flex-direction: column;
      }

      .group:not(:last-child) {
        margin-bottom: var(--gap-between-groups);
      }

      .section-bar {
        position: relative;
        height: var(--section-height);
        display: flex;
        align-items: center;
        box-sizing: border-box;
        padding-left: 16px;
        margin-bottom: var(--gap-after-section);
        overflow: hidden;
        font-family: Georgia, "Times New Roman", serif;
        font-size: var(--section-size);
        line-height: 1;
        font-weight: 700;
      }

      .section-bar::before,
      .section-bar::after {
        content: "";
        position: absolute;
        inset: 0;
      }

      .section-bar::before {
        background: linear-gradient(90deg, var(--section-color), rgba(0, 0, 0, 0.92));
      }

      .section-bar::after {
        background: linear-gradient(
          110deg,
          transparent 0%,
          transparent 38%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 62%,
          transparent 100%
        );
        transform: translateX(-125%);
        animation: bar-sheen 9s ease-in-out infinite;
      }

      .section-bar span {
        position: relative;
        z-index: 1;
        transform: translateY(-0.02em);
      }

      .row {
        position: relative;
        display: grid;
        grid-template-columns: minmax(310px, 1fr) 95px 92px 92px 92px 92px 112px;
        height: var(--row-height);
        align-items: center;
        font-size: var(--body-size);
        line-height: 1;
        font-weight: 700;
        white-space: nowrap;
      }

      .row.aged-row .name {
        position: relative;
        color: #fff7c2;
        text-shadow: 0 0 12px rgba(255, 232, 138, 0.42);
        transform-origin: left center;
        will-change: transform, color, text-shadow;
      }

      .attention-char {
        display: inline-block;
        will-change: transform, color, text-shadow;
      }

      .row.aged-row .name::after {
        content: "";
        position: absolute;
        top: 8%;
        bottom: 8%;
        left: 0;
        width: 90px;
        pointer-events: none;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.7), transparent);
        mix-blend-mode: screen;
        opacity: var(--sweep-opacity, 0);
        transform: translateX(var(--sweep-x, -120px)) skewX(-18deg);
      }

      .row.closeout .normal-row,
      .row.closeout .deal-row {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: minmax(310px, 1fr) 95px 92px 92px 92px 92px 112px;
        align-items: center;
      }

      .row.closeout .normal-row .deal-cell {
        animation: normal-row-fade 8s ease-in-out infinite;
      }

      .row.closeout .deal-row {
        opacity: 0;
        color: #ffe88a;
        text-shadow: 0 0 14px rgba(255, 220, 90, 0.42);
        animation: deal-row-fade 8s ease-in-out infinite;
        pointer-events: none;
      }

      .deal-message {
        grid-column: 2 / -1;
        overflow: hidden;
        text-overflow: clip;
        text-align: center;
        font-size: min(var(--body-size), 30px);
      }

      .name {
        overflow: hidden;
        text-overflow: clip;
        padding-right: 14px;
      }

      .attention-icon {
        display: inline-block;
        margin-left: 8px;
        width: 0.9em;
        height: 0.9em;
        color: #7ed957;
        filter: drop-shadow(0 0 10px rgba(126, 217, 87, 0.62));
        line-height: 1;
        vertical-align: -0.06em;
        transform-origin: center;
        will-change: transform, color, filter;
      }

      .attention-icon svg {
        display: block;
        width: 100%;
        height: 100%;
        fill: currentColor;
      }

      .num {
        text-align: center;
      }

      .loading,
      .error {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 40px;
        box-sizing: border-box;
        text-align: center;
        font: 700 32px/1.25 Arial, Helvetica, sans-serif;
        color: #fff;
        background: #000;
      }

      @keyframes page-sheen {
        0%,
        45% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(120%);
        }
      }

      @keyframes bar-sheen {
        0%,
        35% {
          transform: translateX(-125%);
        }
        70%,
        100% {
          transform: translateX(125%);
        }
      }

      @keyframes normal-row-fade {
        0%,
        48%,
        100% {
          opacity: 1;
        }
        58%,
        88% {
          opacity: 0;
        }
      }

      @keyframes deal-row-fade {
        0%,
        48%,
        100% {
          opacity: 0;
        }
        58%,
        88% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="screen">
      <section class="menu" aria-label="Flower Menu">
        <div class="header">
          <div class="title">Flower Menu</div>
          <div class="column-label">THC</div>
          <div class="column-label">Gram</div>
          <div class="column-label">1/8</div>
          <div class="column-label">1/4</div>
          <div class="column-label">1/2</div>
          <div class="column-label">Ounce</div>
        </div>
        <div id="groups" class="groups">
          <div class="loading">Loading menu...</div>
        </div>
      </section>
    </main>
    <script src="vendor/gsap.min.js"></script>
    <script>
      const sections = [
        ["Indica", "rgb(120, 140, 200)"],
        ["Hybrid", "rgb(110, 185, 70)"],
        ["Sativa", "rgb(230, 35, 35)"]
      ];

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function applyDynamicSizing(rows, activeGroups) {
        const menuHeight = 1920;
        const contentTop = 88;
        const bottomMargin = 34;
        const available = menuHeight - contentTop - bottomMargin;
        const groupCount = activeGroups.length;
        const rowCount = Math.max(rows.length, 1);
        const targetRow = Math.floor(
          (available - groupCount * 60 - groupCount * 18 - Math.max(groupCount - 1, 0) * 24) / rowCount
        );
        const rowHeight = clamp(targetRow, 38, 54);
        const bodySize = clamp(Math.floor(rowHeight * 0.68), 26, 36);
        const sectionHeight = clamp(Math.floor(rowHeight * 1.34), 54, 68);
        const sectionSize = clamp(Math.floor(sectionHeight * 0.70), 36, 48);
        const gapAfterSection = clamp(Math.floor(rowHeight * 0.40), 16, 24);
        const gapBetweenGroups = clamp(Math.floor(rowHeight * 0.52), 18, 30);

        const root = document.documentElement.style;
        root.setProperty("--row-height", `${rowHeight}px`);
        root.setProperty("--body-size", `${bodySize}px`);
        root.setProperty("--section-height", `${sectionHeight}px`);
        root.setProperty("--section-size", `${sectionSize}px`);
        root.setProperty("--gap-after-section", `${gapAfterSection}px`);
        root.setProperty("--gap-between-groups", `${gapBetweenGroups}px`);
      }

      function rowHtml(row) {
        const productName = `${productNameHtml(row)}${attentionIconHtml(row)}`;
        const rowClasses = row.aged_inventory ? "row aged-row" : "row";
        if (row.closeout) {
          return `
            <div class="${rowClasses} closeout">
              <div class="normal-row">
                <div class="name">${productName}</div>
                <div class="num deal-cell">${escapeHtml(row.thc_display)}</div>
                <div class="num deal-cell">${escapeHtml(row.gram)}</div>
                <div class="num deal-cell">${escapeHtml(row.eighth)}</div>
                <div class="num deal-cell">${escapeHtml(row.quarter)}</div>
                <div class="num deal-cell">${escapeHtml(row.half)}</div>
                <div class="num deal-cell">${escapeHtml(row.ounce)}</div>
              </div>
              <div class="deal-row">
                <div class="deal-message">End of jar deal: buy it all, 30% off!</div>
              </div>
            </div>
          `;
        }

        return `
          <div class="${rowClasses}">
            <div class="name">${productName}</div>
            <div class="num">${escapeHtml(row.thc_display)}</div>
            <div class="num">${escapeHtml(row.gram)}</div>
            <div class="num">${escapeHtml(row.eighth)}</div>
            <div class="num">${escapeHtml(row.quarter)}</div>
            <div class="num">${escapeHtml(row.half)}</div>
            <div class="num">${escapeHtml(row.ounce)}</div>
          </div>
        `;
      }

      function attentionIconHtml(row) {
        if (!row.aged_inventory) return "";
        return `
          <span class="attention-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" focusable="false">
              <path d="M32 6c2.5 7.2 3.8 13.2 3.5 18 4.1-5.2 9.1-9 15-11.3-.5 7.8-3.2 14.1-8.1 18.7 5.6-1.1 10.8-.8 15.6.9-4.4 6.1-9.7 9.8-15.9 11.1 3.8 2 7 4.7 9.6 8.1-7.2 1.2-13.1-.2-17.7-4.2v10.2h-4V47.3c-4.6 4-10.5 5.4-17.7 4.2 2.6-3.4 5.8-6.1 9.6-8.1-6.2-1.3-11.5-5-15.9-11.1 4.8-1.7 10-2 15.6-.9-4.9-4.6-7.6-10.9-8.1-18.7 5.9 2.3 10.9 6.1 15 11.3-.3-4.8 1-10.8 3.5-18Z" />
            </svg>
          </span>
        `;
      }

      function productNameHtml(row) {
        if (!row.aged_inventory) return escapeHtml(row.product_name);
        return String(row.product_name ?? "")
          .split("")
          .map((char) => `<span class="attention-char">${char === " " ? "&nbsp;" : escapeHtml(char)}</span>`)
          .join("");
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderMenu(payload) {
        const rows = payload.rows || [];
        const activeGroups = sections.filter(([strain]) => rows.some((row) => row.strain === strain));
        applyDynamicSizing(rows, activeGroups);

        const groups = document.getElementById("groups");
        groups.innerHTML = activeGroups.map(([strain, color]) => {
          const groupRows = rows.filter((row) => row.strain === strain);
          return `
            <section class="group" style="--section-color: ${color}">
              <div class="section-bar"><span>${strain}</span></div>
              ${groupRows.map(rowHtml).join("")}
            </section>
          `;
        }).join("");
        animateAgedInventoryRows();
      }

      function animateAgedInventoryRows() {
        if (!window.gsap) return;
        const agedRows = gsap.utils.toArray(".row.aged-row");
        if (!agedRows.length) return;
        document.documentElement.dataset.gsapTextAnimation = "active";

        agedRows.forEach((row, index) => {
          const name = row.querySelector(".name");
          const marker = row.querySelector(".attention-icon");
          const chars = name.querySelectorAll(".attention-char");
          const delay = index * 0.35;

          gsap.timeline({ repeat: -1, repeatDelay: 4.5, delay })
            .to(name, {
              color: "#fff1a8",
              scale: 1.035,
              textShadow: "0 0 22px rgba(255, 232, 138, 0.85)",
              duration: 0.32,
              ease: "power2.out"
            })
            .to(name, {
              color: "#ffffff",
              scale: 1,
              textShadow: "0 0 8px rgba(255, 232, 138, 0.34)",
              duration: 0.62,
              ease: "elastic.out(1, 0.45)"
            });

          gsap.timeline({ repeat: -1, repeatDelay: 4.5, delay: delay + 0.02 })
            .to(chars, {
              y: -4,
              color: "#ffe88a",
              textShadow: "0 0 18px rgba(255, 232, 138, 0.78)",
              duration: 0.18,
              ease: "power2.out",
              stagger: { each: 0.018, from: "start" }
            })
            .to(chars, {
              y: 0,
              color: "#ffffff",
              textShadow: "0 0 8px rgba(255, 232, 138, 0.34)",
              duration: 0.28,
              ease: "power2.out",
              stagger: { each: 0.012, from: "start" }
            }, "-=0.04");

          gsap.timeline({ repeat: -1, repeatDelay: 4.5, delay: delay + 0.08 })
            .to(marker, {
              scale: 1.45,
              rotate: -14,
              color: "#b8ff70",
              filter: "drop-shadow(0 0 18px rgba(184, 255, 112, 0.94))",
              duration: 0.26,
              ease: "back.out(2.8)"
            })
            .to(marker, {
              scale: 1,
              rotate: 0,
              color: "#7ed957",
              filter: "drop-shadow(0 0 10px rgba(126, 217, 87, 0.62))",
              duration: 0.54,
              ease: "elastic.out(1, 0.45)"
            });

          gsap.fromTo(
            name,
            { "--sweep-x": "-120px" },
            { "--sweep-x": "420px", duration: 1.15, repeat: -1, repeatDelay: 5.2, delay: delay + 0.15, ease: "power2.inOut" }
          );
          gsap.fromTo(
            name,
            { "--sweep-opacity": 0 },
            {
              "--sweep-opacity": 1,
              duration: 0.28,
              repeat: -1,
              yoyo: true,
              repeatDelay: 5.79,
              delay: delay + 0.15,
              ease: "power1.inOut"
            }
          );
        });
      }

      fetch("menu-data.json", { cache: "no-store" })
        .then((response) => {
          if (!response.ok) throw new Error(`Menu data failed to load: ${response.status}`);
          return response.json();
        })
        .then(renderMenu)
        .catch((error) => {
          document.getElementById("groups").innerHTML =
            `<div class="error">Menu data unavailable<br>${escapeHtml(error.message)}</div>`;
        });

      function scaleMenu() {
        const menu = document.querySelector(".menu");
        const menuWidth = 1080;
        const menuHeight = 1920;
        const rotateMode = new URLSearchParams(window.location.search).get("rotate");
        const shouldRotate =
          rotateMode === "ccw" ||
          (rotateMode !== "none" && window.innerWidth > window.innerHeight);

        if (shouldRotate) {
          const scale = Math.min(window.innerWidth / menuHeight, window.innerHeight / menuWidth);
          menu.style.transform = `translate(-50%, -50%) rotate(-90deg) scale(${scale})`;
          return;
        }

        const scale = Math.min(window.innerWidth / menuWidth, window.innerHeight / menuHeight);
        menu.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }

      window.addEventListener("resize", scaleMenu);
      scaleMenu();
    </script>
  </body>
</html>
